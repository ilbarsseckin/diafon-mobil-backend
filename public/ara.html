<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobil Diafon - Ara</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #222; }
    .header { background: #E63946; color: white; padding: 20px; text-align: center; }
    .header h1 { font-size: 20px; }
    .building { padding: 16px; background: white; margin: 12px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .building h2 { font-size: 18px; color: #E63946; }
    .building p { color: #666; font-size: 14px; margin-top: 4px; }
    .resident { display: flex; align-items: center; padding: 14px 16px; background: white; margin: 8px 12px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .resident .info { flex: 1; }
    .resident .name { font-weight: 600; }
    .resident .flat { color: #888; font-size: 13px; }
    .resident button { background: #E63946; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .loading, .error { text-align: center; padding: 40px; color: #888; }

    /* Çağrı ekranı */
    #callScreen { display: none; position: fixed; inset: 0; background: #111; z-index: 100; flex-direction: column; }
    #remoteVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; background: #222; }
    #localVideo { position: absolute; top: 16px; right: 16px; width: 100px; height: 140px; object-fit: cover; border-radius: 12px; border: 2px solid white; z-index: 2; background: #333; }
    .call-info { position: absolute; top: 20px; left: 0; right: 0; text-align: center; color: white; z-index: 2; }
    .call-info .peer-name { font-size: 20px; font-weight: bold; }
    .call-info .status { font-size: 14px; margin-top: 6px; opacity: 0.85; }
    .call-controls { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 2; }
    .call-controls button { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
    .btn-end { background: #E63946; }
    .btn-mute { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="header"><h1>🚪 Mobil Diafon</h1></div>
  <div id="content"><div class="loading">Yükleniyor...</div></div>

  <!-- Çağrı ekranı -->
  <div id="callScreen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-info">
      <div class="peer-name" id="peerName">Sakin</div>
      <div class="status" id="callStatus">Aranıyor...</div>
    </div>
    <div class="call-controls">
      <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🎤</button>
      <button class="btn-end" onclick="endCall()">📞</button>
    </div>
  </div>

  <script>
    const API = 'http://128.140.127.151:4000/api';
    const SOCKET_URL = 'http://128.140.127.151:4000';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    let socket = null;
    let pc = null;
    let localStream = null;
    let callId = null;
    let guestToken = null;
    let currentPeerId = null;
    let micOn = true;

    const iceConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'turn:128.140.127.151:3478', username: 'diafonturn', credential: 'turnpass2026' }
      ]
    };

    async function load() {
      const content = document.getElementById('content');
      if (!token) {
        content.innerHTML = '<div class="error">Geçersiz bağlantı (token yok)</div>';
        return;
      }
      try {
        const res = await fetch(API + '/buildings/by-qr?token=' + encodeURIComponent(token));
        const data = await res.json();
        if (!data.found || !data.building) {
          content.innerHTML = '<div class="error">Bina bulunamadı veya geçersiz QR</div>';
          return;
        }
        let html = '<div class="building"><h2>' + data.building.buildingName + '</h2>';
        if (data.building.address) html += '<p>' + data.building.address + '</p>';
        html += '</div>';
        if (!data.residents || data.residents.length === 0) {
          html += '<div class="error">Bu binada kayıtlı sakin yok</div>';
        } else {
          data.residents.forEach(function(r) {
            html += '<div class="resident"><div class="info"><div class="name">' + r.name + '</div>'
              + '<div class="flat">Daire ' + (r.flatNo || '-') + ' • Kat ' + (r.floor || '-') + '</div></div>'
              + '<button onclick="startCall(\'' + r.userId + '\',\'' + r.name.replace(/'/g, "") + '\')">Ara</button></div>';
          });
        }
        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = '<div class="error">Bağlantı hatası: ' + e.message + '</div>';
      }
    }

    async function startCall(userId, name) {
      currentPeerId = userId;
      document.getElementById('peerName').textContent = name;
      document.getElementById('callStatus').textContent = 'Bağlanıyor...';
      document.getElementById('callScreen').style.display = 'flex';

      try {
        // 1. Misafir token al
        const gtRes = await fetch(API + '/auth/guest-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qrToken: token })
        });
        const gtData = await gtRes.json();
        if (!gtData.success) { alert('Bağlantı kurulamadı'); endCall(); return; }
        guestToken = gtData.token;

        // 2. Kamera + mikrofon
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: 'user' } });
        document.getElementById('localVideo').srcObject = localStream;

        // 3. PeerConnection
        pc = new RTCPeerConnection(iceConfig);
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        pc.ontrack = (e) => {
          document.getElementById('remoteVideo').srcObject = e.streams[0];
          document.getElementById('callStatus').textContent = 'Görüşülüyor';
        };
        pc.onicecandidate = (e) => {
          if (e.candidate && callId) {
            socket.emit('webrtc:ice', { toUserId: currentPeerId, callId: callId, candidate: e.candidate.toJSON() });
          }
        };

        // 4. Socket bağlan
        socket = io(SOCKET_URL, { transports: ['websocket'], auth: { token: guestToken } });

        socket.on('connect', () => {
          document.getElementById('callStatus').textContent = name + ' aranıyor...';
          socket.emit('call:start', { receiverUserId: currentPeerId });
        });

        socket.on('call:ringing', (data) => { callId = data.callId; });

        // Misafir = arayan, offer yapar
        socket.on('call:accepted', async (data) => {
          callId = data.callId;
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          socket.emit('webrtc:offer', { toUserId: currentPeerId, callId: callId, sdp: { sdp: offer.sdp, type: offer.type } });
        });

        socket.on('webrtc:answer', async (data) => {
          await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
        });

        socket.on('webrtc:ice', async (data) => {
          try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch (e) {}
        });

        socket.on('call:rejected', () => { document.getElementById('callStatus').textContent = 'Reddedildi'; setTimeout(endCall, 1500); });
        socket.on('call:ended', () => endCall());
        socket.on('call:unavailable', () => { document.getElementById('callStatus').textContent = 'Sakin çevrimdışı'; setTimeout(endCall, 2000); });

      } catch (e) {
        document.getElementById('callStatus').textContent = 'Hata: ' + e.message;
        setTimeout(endCall, 2000);
      }
    }

    function toggleMute() {
      if (!localStream) return;
      micOn = !micOn;
      localStream.getAudioTracks().forEach(t => t.enabled = micOn);
      document.getElementById('muteBtn').style.opacity = micOn ? '1' : '0.4';
    }

    function endCall() {
      if (callId && socket) socket.emit('call:end', { callId: callId });
      if (pc) { pc.close(); pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (socket) { socket.disconnect(); socket = null; }
      callId = null;
      document.getElementById('callScreen').style.display = 'none';
    }

    load();
  </script>
</body>
</html>
