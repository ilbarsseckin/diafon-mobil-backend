<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MobilDiafon Auto - Araç Sahibini Ara</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f2f4f8; color: #1a1a2e; min-height: 100vh; }
    .wrap { max-width: 520px; margin: 0 auto; padding: 0 14px 30px; }
    .header { text-align: center; padding: 26px 0 14px; }
    .header .logo { height: 42px; }
    .header .brand { font-size: 22px; font-weight: 800; color: #1B2A4A; }
    .header .slogan { font-size: 13px; color: #5a6478; margin-top: 4px; }
    .header .trust { display: inline-block; margin-top: 8px; font-size: 11.5px; color: #1a8a4a; background: #e7f6ec; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
    .steps { display: flex; justify-content: center; gap: 8px; margin: 10px 0 16px; }
    .step { font-size: 11.5px; color: #5a6478; background: #fff; border: 1px solid #e6e9f0; padding: 6px 10px; border-radius: 18px; }
    .step b { color: #E63946; margin-right: 3px; }
    .searchbar { position: sticky; top: 8px; z-index: 20; margin: 0 0 14px; }
    .searchbar input { width: 100%; padding: 14px 18px 14px 44px; border-radius: 16px; border: 1.5px solid #e2e6ee; background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%235a6478" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>') 15px center no-repeat; font-size: 15px; box-shadow: 0 4px 18px rgba(20,33,61,0.07); outline: none; }
    .searchbar input:focus { border-color: #E63946; }
    .no-result { text-align: center; color: #8a93a6; padding: 26px 10px; font-size: 14px; display: none; }
    .building { background: linear-gradient(135deg, #1B2A4A 0%, #2a3f6e 100%); color: #fff; border-radius: 18px; padding: 18px; text-align: center; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(20,33,61,0.18); }
    .building img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
    .building h2 { font-size: 19px; font-weight: 800; }
    .building p { font-size: 13px; opacity: 0.8; margin-top: 3px; }
    .section-title { font-size: 11.5px; font-weight: 800; letter-spacing: 0.08em; color: #8a93a6; margin: 18px 4px 8px; }
    .item { display: flex; align-items: center; background: #fff; border-radius: 16px; padding: 12px 12px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(20,33,61,0.06); border: 1px solid #eef0f5; transition: transform .1s; }
    .item:active { transform: scale(0.99); }
    .item img { flex-shrink: 0; }
    .item .info { flex: 1; min-width: 0; }
    .item .name { font-weight: 700; font-size: 15px; color: #14213D; overflow: hidden; text-overflow: ellipsis; }
    .item .sub { font-size: 12.5px; color: #7a8398; margin-top: 2px; }
    .item button { flex-shrink: 0; background: #E63946; color: white; border: none; padding: 11px 18px; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 3px 10px rgba(230,57,70,0.25); }
    .arac-card { background: #fff; margin: 16px 12px; padding: 32px 20px; border-radius: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .arac-veh { font-size: 15px; font-weight: 700; color: #16213a; margin-bottom: 20px; }
    .arac-card img, .arac-card > div[style*="border-radius:50%"] { margin: 0 auto; }
    .arac-name { font-size: 22px; font-weight: 700; color: #16213a; margin-top: 16px; }
    .arac-online { margin-top: 6px; }
    .arac-call-btn { display: block; width: 100%; margin-top: 24px; padding: 18px; background: #E63946; color: #fff; border: none; border-radius: 16px; font-size: 19px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 18px rgba(230,57,70,0.38); }
    .arac-call-btn:active { transform: scale(0.98); }
    .arac-ring-btn { display: block; width: 100%; margin-top: 12px; padding: 16px; background: #1B2A4A; color: #fff; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .arac-ring-btn:disabled { opacity: 0.85; }
    .arac-msg { margin-top: 16px; padding: 14px 16px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 14px; font-size: 15px; color: #8a6d00; font-weight: 600; }
    .arac-kvkk { margin-top: 14px; font-size: 11px; color: #8a93a8; line-height: 1.4; }
    .item button:active { background: #c1121f; }
    .item button.btn-ring { background: #fff4e5; color: #E8830C; box-shadow: none; border: 1.5px solid #f5d9b0; padding: 11px 13px; margin-right: 8px; font-size: 16px; }
    .item button.btn-ring:active { background: #ffe9cc; }
    .back-btn { background: none; border: none; color: #5a6478; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 4px; margin-bottom: 6px; }
    .loading, .error { text-align: center; padding: 44px 16px; color: #7a8398; font-size: 15px; }
    .error { color: #c0392b; }
    .site-footer { text-align: center; margin-top: 30px; background: #fff; border-radius: 18px; padding: 22px 16px; border: 1px solid #eef0f5; }
    .site-footer .ttl { font-weight: 800; font-size: 15px; color: #14213D; }
    .site-footer .txt { font-size: 12.5px; color: #7a8398; margin: 6px 0 12px; }
    .site-footer .cta { display: inline-block; background: #E63946; color: #fff; padding: 10px 22px; border-radius: 14px; font-weight: 700; font-size: 14px; text-decoration: none; }
    .site-footer .link { display: block; margin-top: 10px; font-size: 12px; color: #8a93a6; text-decoration: none; }
    #callScreen { display: none; position: fixed; inset: 0; background: #0a0f1e; z-index: 100; }
    #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
    #localVideo { position: absolute; top: 18px; right: 18px; width: 110px; height: 150px; object-fit: cover; border-radius: 14px; border: 2px solid rgba(255,255,255,0.35); z-index: 2; }
    .call-info { position: absolute; top: 22px; left: 22px; color: #fff; z-index: 2; }
    .call-info .peer-name { font-size: 21px; font-weight: 800; }
    .call-info .status { font-size: 14px; margin-top: 6px; opacity: 0.85; }
    .call-controls { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 2; }
    .call-controls button { width: 62px; height: 62px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; color: white; }
    .btn-end { background: #E63946; }
    .btn-mute { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="wrap">
  <div class="header">
    <img class="logo" src="https://cdn.mobildiafon.com/logo/logo.webp" alt="MobilDiafon" onerror="this.parentElement.querySelector('.brand').style.display='block'">
    <div class="brand" style="display:none">MobilDiafon</div>
    <div class="slogan">Araç sahibine ulaşın</div>
    <div class="trust">🔒 Güvenli görüntülü görüşme</div>
  </div>
  <div class="steps">
    <div class="step"><b>1</b> Araç sahibi</div>
    <div class="step"><b>2</b> Ara</div>
    <div class="step"><b>3</b> Görüntülü görüş</div>
  </div>
  <div class="searchbar" id="searchbar" style="display:none">
    <input type="text" id="searchInput" placeholder="Daire no veya isim ara..." autocomplete="off">
  </div>
  <div class="no-result" id="noResult">Sonuç bulunamadı</div>
  <div id="content"><div class="loading">Yükleniyor...</div></div>
  <div class="site-footer">
    <div class="ttl">Siz de aracınıza MobilDiafon Auto alın</div>
    <div class="txt">Aracınıza yapıştırdığınız QR ile, numaranızı paylaşmadan size ulaşılsın.</div>
    <a class="cta" href="https://mobildiafon.com" target="_blank" rel="noopener">Keşfet →</a>
    <a class="link" href="https://mobildiafon.com" target="_blank" rel="noopener">mobildiafon.com</a>
  </div>
  </div>

  <div id="callScreen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="call-info">
      <div class="peer-name" id="peerName">Sakin</div>
      <div class="status" id="callStatus">Aranıyor...</div>
    </div>
    <div class="call-controls">
      <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🎤</button>
      <button class="btn-end" onclick="endCall()">📞</button>
    </div>
  </div>

  <script>
    const API = 'https://mobildiafon.com/api';
    const SOCKET_URL = 'https://mobildiafon.com';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const vehCode = params.get('code');

    let socket = null, pc = null, localStream = null;
    let callId = null, guestToken = null, currentPeerId = null, micOn = true;
    let siteData = null; // site ise blok listesi burada

    const iceConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'turn:128.140.127.151:3478', username: 'diafonturn', credential: 'turnpass2026' }
      ]
    };

    // Canli arama filtresi - render edilen .item kartlarini metne gore gizle/goster
    function initSearch() {
      const inp = document.getElementById('searchInput');
      const bar = document.getElementById('searchbar');
      const noRes = document.getElementById('noResult');
      if (!inp) return;
      inp.addEventListener('input', () => {
        const q = inp.value.trim().toLocaleLowerCase('tr');
        const items = document.querySelectorAll('#content .item');
        let visible = 0;
        items.forEach(it => {
          const txt = (it.textContent || '').toLocaleLowerCase('tr');
          const show = !q || txt.includes(q);
          it.style.display = show ? '' : 'none';
          if (show) visible++;
        });
        // Bolum basliklarini da yonet: altinda gorunen kart yoksa gizle
        document.querySelectorAll('#content .section-title').forEach(st => {
          let el = st.nextElementSibling, any = false;
          while (el && !el.classList.contains('section-title')) {
            if (el.classList.contains('item') && el.style.display !== 'none') { any = true; break; }
            el = el.nextElementSibling;
          }
          st.style.display = any ? '' : 'none';
        });
        noRes.style.display = (q && visible === 0) ? 'block' : 'none';
      });
    }
    function showSearchbar() {
      const bar = document.getElementById('searchbar');
      if (bar) bar.style.display = '';
    }
    async function ringVehicle() {
      const btn = document.querySelector('.arac-ring-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Gönderiliyor...'; }
      try {
        const res = await fetch(API + '/vehicles/ring/' + encodeURIComponent(vehCode), { method: 'POST' });
        const data = await res.json();
        if (btn) {
          if (data.success) {
            btn.textContent = '✓ Sahibe haber verildi';
            btn.style.background = '#1a8f3c';
          } else {
            btn.textContent = data.message || 'Gönderilemedi';
            btn.disabled = false;
          }
        }
      } catch (e) {
        if (btn) { btn.textContent = 'Bağlantı hatası'; btn.disabled = false; }
      }
    }
    async function loadVehicle() {
      const content = document.getElementById('content');
      try {
        const res = await fetch(API + '/vehicles/lookup/' + encodeURIComponent(vehCode));
        const data = await res.json();
        if (!data.found) { content.innerHTML = '<div class="error">' + (data.message || 'Araç bulunamadı') + '</div>'; return; }
        const o = data.owner || {};
        const onlineDot = o.isOnline ? '<span style="color:#1a8f3c;font-size:13px;">● Çevrimiçi</span>' : '<span style="color:#888;font-size:13px;">● Çevrimdışı</span>';
        const aracAdi = data.vehicle.label || 'Araç';
        const mesajHtml = data.activeMessage
          ? '<div class="arac-msg">💬 ' + data.activeMessage + '</div>'
          : '';
        content.innerHTML =
          '<div class="arac-card">' +
            '<div style="width:96px;height:96px;border-radius:50%;background:#E63946;color:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto;">🚗</div>' +
            '<div class="arac-name">' + aracAdi + '</div>' +
            '<div class="arac-online">' + onlineDot + '</div>' +
            mesajHtml +
            '<button class="arac-call-btn" onclick="callUser(\'' + o.userId + '\',\'' + aracAdi + '\')">📞 Ara</button>' +
            '<button class="arac-ring-btn" onclick="ringVehicle()">🔔 Zil Çal (Sahibe Haber Ver)</button>' +
            '<div class="arac-kvkk">🔒 Güvenlik amacıyla aramanız konumunuzla birlikte kaydedilir.</div>' +
          '</div>';
      } catch (e) {
        content.innerHTML = '<div class="error">Bağlantı hatası</div>';
      }
    }
    async function load() {
      const content = document.getElementById('content');
      if (!vehCode) { content.innerHTML = '<div class="error">Geçersiz araç bağlantısı</div>'; return; }
      return loadVehicle();
      if (!token) { content.innerHTML = '<div class="error">Geçersiz bağlantı</div>'; return; }
      try {
        const res = await fetch(API + '/buildings/by-qr?token=' + encodeURIComponent(token));
        const data = await res.json();
        if (!data.found) { content.innerHTML = '<div class="error">Bina bulunamadı veya geçersiz QR</div>'; return; }

        const flatParam = params.get('flat');
        const userParam = params.get('user');
        const guardParam = params.get('guard');

        // Guvenlik QR -> sadece guvenligi goster
        if (guardParam && data.guards && data.guards.length > 0) {
          renderGuardOnly(data, guardParam);
          return;
        }

        // SITE ise ve ozel parametre yoksa -> blok secim ekrani
        if (data.isSite && data.blocks && data.blocks.length > 0 && !flatParam && !userParam) {
          siteData = data;
          renderBlocks(data);
          return;
        }

        // Tek bina veya flat/user parametreli -> direkt sakinler/daireler
        renderResidents(data, flatParam, userParam);
      } catch (e) {
        content.innerHTML = '<div class="error">Bağlantı hatası: ' + e.message + '</div>';
      }
    }

    function renderBlocks(data) {
      const bar = document.getElementById('searchbar');
      if (bar) bar.style.display = 'none';
      const content = document.getElementById('content');
      let html = '<div class="building"><h2>' + data.siteName + '</h2><p>Lütfen blok seçin</p></div>';
      html += '<div class="section-title">BLOKLAR</div>';
      data.blocks.forEach(b => {
        const label = b.blockName || b.buildingName;
        html += '<div class="item" onclick="selectBlock(\'' + b.qrToken + '\')" style="cursor:pointer">'
          + '<div class="info"><div class="name">' + label + '</div>'
          + '<div class="sub">' + b.residentCount + ' sakin</div></div>'
          + '<button>Seç ›</button></div>';
      });
      content.innerHTML = html;
    }

    async function selectBlock(blockToken) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Yükleniyor...</div>';
      try {
        const res = await fetch(API + '/buildings/by-qr?token=' + encodeURIComponent(blockToken));
        const data = await res.json();
        renderResidents(data, null, null, blockToken);
      } catch (e) {
        content.innerHTML = '<div class="error">Hata: ' + e.message + '</div>';
      }
    }

    function renderGuardOnly(data, guardId) {
      const bar = document.getElementById('searchbar');
      if (bar) bar.style.display = 'none';
      const content = document.getElementById('content');
      let guard = (data.guards || []).find(g => String(g.userId) === String(guardId));
      if (!guard) guard = (data.guards || [])[0];
      let html = '<div class="building"><h2>' + data.building.buildingName + '</h2><p>Güvenlik / Danışma</p></div>';
      html += '<div class="section-title">GÜVENLİK / DANIŞMA</div>';
      const online = guard.isOnline ? '<span style="color:#1a8a4a;font-size:12px;">● çevrimiçi</span>' : '<span style="color:#bbb;font-size:12px;">● çevrimdışı</span>';
      const gphoto = guard.photoUrl
        ? '<img src="' + (guard.photoUrl.startsWith('http') ? guard.photoUrl : 'https://mobildiafon.com' + guard.photoUrl) + '" style="width:46px;height:46px;border-radius:50%;object-fit:cover;margin-right:12px;">'
        : '<div style="width:46px;height:46px;border-radius:50%;background:#1a2a4a;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px;">🛡️</div>';
      html += '<div class="item">' + gphoto + '<div class="info">'
        + '<div class="name">' + guard.name + '</div>'
        + '<div class="sub">' + online + '</div></div>'
        + '<button onclick="callUser(\'' + guard.userId + '\',\'' + guard.name.replace(/'/g,"") + '\')">Ara</button></div>';
      content.innerHTML = html;
    }

    function renderResidents(data, flatParam, userParam, blockToken) {
      showSearchbar();
      const content = document.getElementById('content');
      let residents = data.residents || [];
      if (flatParam) residents = residents.filter(r => String(r.flatNo) === String(flatParam));
      if (userParam) residents = residents.filter(r => String(r.userId) === String(userParam));

      let html = '';
      // Site icindeysek geri butonu
      if (siteData) {
        html += '<button class="back-btn" onclick="renderBlocks(siteData)">‹ Bloklara dön</button>';
      }
      html += '<div class="building">'; if (data.building.imageUrl) { html += '<img src="' + (data.building.imageUrl.startsWith('http') ? data.building.imageUrl : 'https://mobildiafon.com' + data.building.imageUrl) + '" style="width:100%;max-height:160px;object-fit:cover;border-radius:12px;margin-bottom:10px;">'; } html += '<h2>' + data.building.buildingName + '</h2>';
      if (data.building.address) html += '<p>' + data.building.address + '</p>';
      if (flatParam) html += '<p>Daire ' + flatParam + '</p>';
      html += '</div>';

      // Kisisel QR -> direkt kisi
      if (userParam && residents.length === 1) {
        const r = residents[0];
        html += '<div class="item"><div class="info"><div class="name">' + r.name + '</div>'
          + '<div class="sub">Daire ' + (r.flatNo || '-') + '</div></div>'
          + (r.apartmentId ? '<button class="btn-ring" onclick="ringFlat(\'' + r.apartmentId + '\',\'' + r.name.replace(/'/g,"") + '\')" title="Zil Cal">\uD83D\uDD14</button>' : '')
          + '<button onclick="callUser(\'' + r.userId + '\',\'' + r.name.replace(/'/g,"") + '\')">Ara</button></div>';
        content.innerHTML = html;
        return;
      }

      if (residents.length === 0) {
        html += '<div class="error">Bu blokta henüz kayıtlı sakin yok</div>';
        content.innerHTML = html;
        return;
      }

      // Daireye gore grupla
      const flats = {};
      residents.forEach(r => {
        const key = r.apartmentId || r.flatNo;
        if (!flats[key]) flats[key] = { apartmentId: r.apartmentId, flatNo: r.flatNo, floor: r.floor, listingStatus: r.listingStatus, people: [] };
        flats[key].people.push(r);
      });

      // Guvenlik / Danisma bolumu (varsa)
      if (data.guards && data.guards.length > 0) {
        html += '<div class="section-title">GÜVENLİK / DANIŞMA</div>';
        data.guards.forEach(g => {
          const online = g.isOnline ? '<span style="color:#1a8a4a;font-size:12px;">● çevrimiçi</span>' : '<span style="color:#bbb;font-size:12px;">● çevrimdışı</span>';
          const gphoto = g.photoUrl
            ? '<img src="' + (g.photoUrl.startsWith('http') ? g.photoUrl : 'https://mobildiafon.com' + g.photoUrl) + '" style="width:46px;height:46px;border-radius:50%;object-fit:cover;margin-right:12px;">'
            : '<div style="width:46px;height:46px;border-radius:50%;background:#1a2a4a;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px;">🛡️</div>';
          html += '<div class="item">' + gphoto + '<div class="info">'
            + '<div class="name">' + g.name + '</div>'
            + '<div class="sub">' + online + '</div></div>'
            + '<button onclick="callUser(\'' + g.userId + '\',\'' + g.name.replace(/'/g,"") + '\')">Ara</button></div>';
        });
      }

      html += '<div class="section-title">DAİRELER</div>';
      Object.values(flats).forEach(f => {
        const count = f.people.length;
        // Isim ozeti: tek kisi -> adi, cok kisi -> "Ad +N"
        let names = f.people.map(p => p.name).filter(Boolean);
        let nameLabel = '';
        if (names.length === 1) nameLabel = names[0];
        else if (names.length > 1) nameLabel = names[0] + ' +' + (names.length - 1);
        // Foto: ilk kisinin fotosu
        const firstPhoto = f.people[0] && f.people[0].photoUrl ? f.people[0].photoUrl : null;
        const photoHtml = firstPhoto
          ? '<img src="' + (firstPhoto.startsWith('http') ? firstPhoto : 'https://mobildiafon.com' + firstPhoto) + '" style="width:46px;height:46px;border-radius:50%;object-fit:cover;margin-right:12px;">'
          : '<div style="width:46px;height:46px;border-radius:50%;background:#f0e0e2;display:flex;align-items:center;justify-content:center;margin-right:12px;font-size:20px;">🏠</div>';
        html += '<div class="item">' + photoHtml + '<div class="info">'
          + '<div class="name">Daire ' + (f.flatNo || '-') + (nameLabel ? ': ' + nameLabel : '') + (f.listingStatus === 'sale' ? ' <span style="font-size:11px;font-weight:700;color:#c2691a;background:#fff0e0;padding:2px 8px;border-radius:10px;margin-left:6px;">Satilik</span>' : f.listingStatus === 'rent' ? ' <span style="font-size:11px;font-weight:700;color:#1a5fc2;background:#e3f0ff;padding:2px 8px;border-radius:10px;margin-left:6px;">Kiralik</span>' : '') + '</div>'
          + '<div class="sub">' + count + ' kişi' + (f.floor ? ' • Kat ' + f.floor : '') + '</div></div>'
          + '<button class="btn-ring" onclick="ringFlat(\'' + f.apartmentId + '\',\'Daire ' + (f.flatNo || '-') + '\')" title="Zil Cal">\uD83D\uDD14</button>'
          + '<button onclick="callFlat(\'' + f.apartmentId + '\',\'Daire ' + (f.flatNo || '-') + '\')">Ara</button></div>';
      });

      content.innerHTML = html;
    }

    async function setupCall(name) {
      document.getElementById('peerName').textContent = name;
      document.getElementById('callStatus').textContent = 'Bağlanıyor...';
      document.getElementById('callScreen').style.display = 'flex';

      const gtRes = await fetch(API + '/auth/guest-token', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(vehCode ? { code: vehCode } : { qrToken: token })
      });
      const gtData = await gtRes.json();
      if (!gtData.success) { alert('Bağlantı kurulamadı'); endCall(); return false; }
      guestToken = gtData.token;

      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: 'user' } });
      document.getElementById('localVideo').srcObject = localStream;

      pc = new RTCPeerConnection(iceConfig);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = (e) => {
        document.getElementById('remoteVideo').srcObject = e.streams[0];
        document.getElementById('callStatus').textContent = 'Görüşülüyor';
      };
      pc.onicecandidate = (e) => {
        if (e.candidate && callId && currentPeerId) {
          socket.emit('webrtc:ice', { toUserId: currentPeerId, callId, candidate: e.candidate.toJSON() });
        }
      };

      socket = io(SOCKET_URL, { transports: ['websocket'], auth: { token: guestToken } });
      socket.on('call:ringing', (d) => { callId = d.callId; });
      socket.on('call:accepted', async (d) => {
        callId = d.callId;
        currentPeerId = d.accepterId || currentPeerId;
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('webrtc:offer', { toUserId: currentPeerId, callId, sdp: { sdp: offer.sdp, type: offer.type } });
      });
      socket.on('webrtc:answer', async (d) => { await pc.setRemoteDescription(new RTCSessionDescription(d.sdp)); });
      socket.on('webrtc:ice', async (d) => { try { await pc.addIceCandidate(new RTCIceCandidate(d.candidate)); } catch(e){} });
      socket.on('call:rejected', () => { document.getElementById('callStatus').textContent = 'Reddedildi'; setTimeout(endCall, 1500); });
      socket.on('call:ended', () => endCall());
      socket.on('call:unavailable', () => { document.getElementById('callStatus').textContent = 'Cevap verilmedi'; setTimeout(endCall, 2000); });
      return true;
    }

    async function callUser(userId, name) {
      currentPeerId = userId;
      try {
        if (!await setupCall(name)) return;
        const startUser = async () => {
          document.getElementById('callStatus').textContent = name + ' aranıyor...';
          let pos = null;
          try { pos = await getPos(); } catch (e) {}
          socket.emit('call:start', {
            receiverUserId: userId,
            callerLat: pos ? pos.lat : undefined,
            callerLng: pos ? pos.lng : undefined,
          });
        };
        if (socket.connected) startUser(); else socket.once('connect', startUser);
      } catch (e) { document.getElementById('callStatus').textContent = 'Hata: ' + e.message; setTimeout(endCall, 2000); }
    }

    function getPos() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) { resolve(null); return; }
        navigator.geolocation.getCurrentPosition(
          (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 8000 }
        );
      });
    }
    async function ringFlat(apartmentId, name) {
      try {
        const res = await fetch('/api/calls/ring', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apartmentId, visitorName: 'Ziyaretci' }),
        });
        const data = await res.json();
        if (data.success) {
          alert('🔔 ' + name + ' icin zil calindi');
        } else {
          alert(data.message || 'Zil calinamadi');
        }
      } catch (e) {
        alert('Zil calinamadi, tekrar deneyin');
      }
    }
    async function callFlat(apartmentId, name) {
      currentPeerId = null;
      try {
        if (!await setupCall(name)) return;
        const pos = await getPos();
        const startFlat = () => {
          document.getElementById('callStatus').textContent = name + ' çalınıyor...';
          const payload = { apartmentId, source: 'qr' };
          if (pos) { payload.lat = pos.lat; payload.lng = pos.lng; }
          socket.emit('call:start-flat', payload);
        };
        if (socket.connected) startFlat(); else socket.once('connect', startFlat);
      } catch (e) { document.getElementById('callStatus').textContent = 'Hata: ' + e.message; setTimeout(endCall, 2000); }
    }

    function toggleMute() {
      if (!localStream) return;
      micOn = !micOn;
      localStream.getAudioTracks().forEach(t => t.enabled = micOn);
      document.getElementById('muteBtn').style.opacity = micOn ? '1' : '0.4';
    }

    function endCall() {
      if (callId && socket) socket.emit('call:end', { callId });
      if (pc) { pc.close(); pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      if (socket) { socket.disconnect(); socket = null; }
      callId = null; currentPeerId = null;
      document.getElementById('callScreen').style.display = 'none';
    }

    initSearch();
    load();
  </script>
</body>
</html>
